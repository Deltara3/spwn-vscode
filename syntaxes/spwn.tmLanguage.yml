# Based a bit on the original grammar.
$schema: https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json
name: SPWN

patterns:
    - include: "#root"

repository:
    root:
        patterns:
            - include: "#comments"
            - include: "#strings"
            - include: "#numbers"

            - comment: "Builtin identifiers"
              match: "\\$"
              name: "constant.language.spwn"

            - comment: "Type identifiers"
              match: "@[a-zA-Z_]\\w*"
              name: "support.type.spwn"
            
            - comment: "Constant keywords"
              match: "\\b(true|false|null|trigger|obj|self)\\b"
              name: "constant.language.spwn"

            - include: "#keywords"
            - include: "#operators"

    comments:
        patterns:
            - comment: Block comments
              begin: /\*
              end: \*/
              captures:
                  "1": { name: punctuation.definition.comment.spwn }
              name: comment.block.spwn

            - comment: Line comments
              begin: //
              beginCaptures:
                  "1": { name: punctuation.definition.comment.spwn }
              end: $
              name: "comment.line.spwn"

    strings:
        patterns:
            - comment: "Prefixed string"
              begin: "\\b(r|u|64)(['\"])"
              beginCaptures:
                  "1": { name: storage.type.string.spwn }
                  "2": { name: punctuation.definition.string.begin.spwn }
              end: "(\\2)|(\n)"
              endCaptures:
                  "1": { name: punctuation.definition.string.end.spwn }
                  "2": { name: invalid.illegal.unclosed-string.spwn }
              name: string.quoted.spwn

            - comment: "String"
              begin: "(['\"])"
              beginCaptures:
                  "1": { name: punctuation.definition.string.begin.spwn }
              end: "(\\1)|(\n)"
              endCaptures:
                  "1": { name: punctuation.definition.string.end.spwn }
                  "2": { name: invalid.illegal.unclosed-string.spwn }
              name: "string.quoted.spwn"
              patterns:
                  - include: "#escapes"
                  
    escapes:
        patterns:
            - comment: "Escape sequences"
              match: "\\\\([nrt'\"]|u\\{[0-9a-fA-F]{1,6}\\})"
              name: "constant.character.escape.spwn"

            - comment: "Illegal sequences"
              match: "\\\\[^nrt'\"\\\\u]|\\\\u(?!\\{[0-9a-fA-F]{1,6}\\})"
              name: "invalid.illegal.escape.spwn"

    numbers:
        patterns:
            - comment: "Group, item, color, and block ID literals"
              match: "(?<![a-zA-Z_])(\\d+|\\?)([gbic])\\b"
              captures:
                  "1": { name: constant.numeric.id.spwn }
                  "2": { name: storage.type.number.spwn }
              name: "constant.numeric.id.spwn"

            - comment: "Hexadecimal literal"
              match: "\\b(0x)([0-9a-fA-F][0-9a-fA-F_]+)\\b"
              captures:
                  "1": { name: storage.type.number.spwn }
                  "2": { name: constant.numeric.hex.spwn }

            - comment: "Octal literal"
              match: "\\b(0o)([0-7][0-7_]+)\\b"
              captures:
                  "1": { name: storage.type.number.spwn }
                  "2": { name: constant.numeric.oct.spwn }

            - comment: "Binary literal"
              match: "\\b(0b)([01][01_]+)\\b"
              captures:
                  "1": { name: storage.type.number.spwn }
                  "2": { name: constant.numeric.bin.spwn }

            - comment: "Integer literal"
              match: "\\b([\\d][\\d_]+)\\b"
              name: "constant.numeric.dec.spwn"

    keywords:
        patterns:
            - comment: "Control keywords"
              match: "\\b(return|impl|for|in|is|has|throw|if|else|switch|match|case|break|continue|while|obj|trigger|import|extract|type|sync)\\b"
              name: keyword.control.spwn

    operators:
        patterns:
            - comment: "Return operator"
              match: "->"
              name: keyword.operator.relational.spwn

            - comment: "Lambda operator"
              match: "=>"
              name: storage.type.function.arrow.spwn
            
            - comment: "Swap operator"
              match: "<=>"
              name: keyword.operator.assignment.spwn

            - comment: "Increment operator"
              match: "\\+\\+"
              name: keyword.operator.increment.spwn

            - comment: "Decrement operator"
              match: "\\-\\-"
              name: keyword.operator.decrement.spwn

            - comment: "Comparison operators"
              match: "(==|!=|>=|<=|>|<)"
              name: keyword.operator.comparison.spwn
            
            - comment: "Logical operators"
              match: "(\\|\\||&&|!)"
              name: keyword.operator.logical.spwn

            - comment: "Assignment operators"
              match: "(=|\\+=|\\-=|\\*=|\\/=|\\^=|%=|\\/%=)"
              name: keyword.operator.assignment.spwn

            - comment: "Arithmetic operators"
              match: "(\\+|\\-|\\*\\*|\\*|\\/%|\\/|\\^|%|\\|)"
              name: keyword.operator.arithmetic.spwn
            
            - comment: "Range operator"
              match: "\\.\\."
              name: "keyword.operator.range.spwn"
            
            - comment: "Scope operator"
              match: "::"
              name: "keyword.operator.spwn"

scopeName: source.spwn
