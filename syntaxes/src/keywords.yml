scopeName: source.spwn

patterns:
    - include: '#null'

repository:
    keywords:
        patterns:
          - include: '#for-in'
          - include: '#impl-block'
          - include: '#constant-keywords'
          - include: '#self-keyword'
          - include: '#legacy-keywords'
          - include: '#control-keywords'
          - include: '#exception-keywords'
          - include: '#type-keywords'
          - include: '#library-keywords'
          - include: '#pseudo-op-keywords'
          - include: '#reserved-keywords'

    for-in:
        patterns:
          - begin: \bfor\b
            beginCaptures:
                0: { name: keyword.control.spwn }
            end: \bin\b
            endCaptures:
                0: { name: keyword.control.spwn }
            patterns:
              - include: '#root'

    impl-block:
        patterns:
          - begin: \bimpl\b\s*(@[a-zA-Z_]\w*)
            beginCaptures:
                0: { name: storage.type.spwn }
                1: { name: entity.name.type.spwn }
            end: (?<=\})
            patterns:
              - begin: \{
                beginCaptures:
                    0: { name: punctuation.other.curly.begin.spwn }
                end: \}
                endCaptures:
                    0: { name: punctuation.other.bracket.curly.end.spwn }
                patterns:
                  - begin: ([a-zA-Z_]\w*)\s*(:)(?!:)(?=\s*!\{)
                    beginCaptures:
                        1:
                            patterns:
                              - name: entity.name.function.macro.spwn
                                match: '[a-zA-Z_]\w*'
                        2: { name: punctuation.separator.key-value.spwn }
                    end: ",|(?=\\})"
                    endCaptures:
                        0: { name: punctuation.separator.spwn }

                    patterns:
                      - include: '#root'

                  - begin: ([a-zA-Z_]\w*)\s*(:)(?!:)(?=\s*\()
                    beginCaptures:
                        1:
                            patterns:
                              - include: '#overloads'

                              - name: entity.name.function.spwn
                                match: '[a-zA-Z_]\w*'
                        2: { name: punctuation.separator.key-value.spwn }
                    end: ",|(?=\\})"
                    endCaptures:
                        0: { name: punctuation.separator.spwn }

                    patterns:
                      - include: '#root'
                    
                  - begin: ([a-zA-Z_]\w*)\s*(:)(?!:)
                    beginCaptures:
                        1: { name: variable.property.spwn }
                        2: { name: punctuation.separator.key-value.spwn }
                    end: ',|(?=\})'
                    endCaptures:
                        0: { name: punctuation.separator.spwn }

                    patterns:
                      - include: '#root'


    constant-keywords:
        patterns:
          - name: constant.language.spwn
            match: \b(true|false|null)\b|\$

    self-keyword:
        patterns:
          - name: variable.language.spwn
            match: \bself\b

    legacy-keywords:
        patterns:
          - name: keyword.control.deprecated.spwn
            match: \b(switch|case)\b

          - name: keyword.operator.logical.deprecated.spwn
            match: \bhas\b

          - name: keyword.control.exception.deprecated.spwn
            match: \berror\b

    control-keywords:
        patterns:
          - name: keyword.control.spwn
            match: \b(let|if|else|while|for|break|continue|match|return)\b

    exception-keywords:
        patterns:
          - name: keyword.control.exception.spwn
            match: \bthrow\b

    type-keywords:
        patterns:
          - name: storage.type.spwn
            match: \b(type|impl|obj|trigger)\b

    library-keywords:
        patterns:
          - name: keyword.control.import.spwn
            match: \b(import|extract)\b

    pseudo-op-keywords:
        patterns:
          - name: keyword.operator.logical.spwn
            match: \b(in|is)\b

    reserved-keywords:
        patterns:
          - name: keyword.other.deprecated.spwn
            match: \bsync\b