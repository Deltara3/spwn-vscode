scopeName: source.spwn

patterns:
    - include: '#null'

repository:
    comments:
        patterns:
          - include: '#comment-block'
          - include: '#comment-line'

    comment-block:
        patterns:
          - name: comment.block.spwn
            begin: (/\*)
            end: (\*/)
            captures:
                1: { name: punctuation.definition.comment.spwn }

    comment-line:
        patterns:
          - name: comment.line.spwn
            begin: (//)
            beginCaptures:
                1: { name: punctuation.definition.comment.spwn }
            end: '$'