scopeName: source.spwn

patterns:
    - include: '#null'

repository:
    overloads:
        patterns:
          - include: '#comparison-overloads'
          - include: '#logical-overloads'
          - include: '#assignment-overloads'
          - include: '#arithmetic-overloads'
          - include: '#other-overloads'

    comparison-overloads:
        patterns:
          - name: support.function.magic.spwn
            match: \b_(equal|not_equal|more_or_equal|less_or_equal|more_than|less_than)_\b

    logical-overloads:
        patterns:
          - match: \b_(or|and|not|negate)_\b
            name: support.function.magic.spwn

    assignment-overloads:
        patterns:
          - match: \b_(assign|add|subtract|multiply|divide|exponate|modulate|intdivide|swap)_\b
            name: support.function.magic.spwn

    arithmetic-overloads:
        patterns:
          - match: \b_(plus|minus|times|intdivided_by|divided_by|pow|mod|either|increment|pre_increment|decrement|pre_decrement)_\b
            name: support.function.magic.spwn

    other-overloads:
        patterns:
          - match: \b_(display|as|has|range|unary_range)_\b
            name: support.function.magic.spwn