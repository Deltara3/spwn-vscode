scopeName: source.spwn

patterns:
    - include: '#null'

repository:
    calls:
        patterns:
          - include: '#standalone-trigger'
          - include: '#standalone-function'

    standalone-trigger:
        patterns:
          - name: entity.name.function.macro.spwn
            match: \b[a-zA-Z_]\w*!

    standalone-function:
        patterns:
          - name: entity.name.function.spwn
            match: \b[a-zA-Z_]\w*(?=\s*\()

    property-access:
        patterns:
          - include: '#property-type'
          - include: '#overloads'
          - include: '#property-trigger'
          - include: '#property-method'
          - include: '#property-generic'

    property-type:
        patterns:
          - name: storage.type.spwn
            match: (?<=\.)(?<!\.{2})\btype\b

    property-trigger:
        patterns:
          - name: entity.name.function.macro.spwn
            match: (?<=\.)(?<!\.{2})[a-zA-Z_]\w*!

    property-method:
        patterns:
          - name: entity.name.function.spwn
            match: (?<=\.)(?<!\.{2})[a-zA-Z_]\w*(?=\s*\()

    property-generic:
        patterns:
          - name: variable.property.spwn
            match: (?<=\.)(?<!\.{2})[a-zA-Z_]\w*

    namespace-access:
        patterns:
          - include: '#namespace-segment'
          - include: '#namespace-trigger'
          - include: '#namespace-method'
          - include: '#namespace-member'

    namespace-segment:
        patterns:
          - match: (::)([a-zA-Z_]\w*)(?=::)
            captures:
                1: { name: punctuation.accessor.namespace.spwn }
                2: { name: entity.name.namespace.spwn }

    namespace-trigger:
        patterns:
          - match: (::)([a-zA-Z_]\w*!)
            captures:
                1: { name: punctuation.accessor.namespace.spwn }
                2: { name: entity.name.function.macro.spwn }

    namespace-method:
        patterns:
          - match: (::)([a-zA-Z_]\w*)(?=\s*\()
            captures:
                1: { name: punctuation.accessor.namespace.spwn }
                2: { name: entity.name.function.spwn }

    namespace-member:
        patterns:
          - match: (::)([a-zA-Z_]\w*)
            captures:
                1: { name: punctuation.accessor.namespace.spwn }
                2: { name: variable.property.spwn }