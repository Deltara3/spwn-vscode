scopeName: source.spwn

patterns:
    - include: '#null'

repository:
    operators:
        patterns:
          - include: '#swap-operator'
          - include: '#return-operator'
          - include: '#lambda-operator'
          - include: '#range-operator'
          - include: '#increment-operator'
          - include: '#decrement-operator'
          - include: '#comparison-operators'
          - include: '#logical-operators'
          - include: '#assignment-operators'
          - include: '#arithmetic-operators'

    swap-operator:
        patterns:
          - name: keyword.operator.assignment.spwn
            match: <=>

    return-operator:
        patterns:
          - name: keyword.operator.relational.spwn
            match: ->

    lambda-operator:
        patterns:
          - name: storage.type.function.spwn
            match: =>
    
    range-operator:
        patterns:
          - name: keyword.operator.range.spwn
            match: \.\.

    increment-operator:
        patterns:
          - name: keyword.operator.increment.spwn
            match: \+\+

    decrement-operator:
        patterns:
          - name: keyword.operator.decrement.spwn
            match: \-\-

    comparison-operators:
        patterns:
          - name: keyword.operator.comparison.spwn
            match: (==|!=|>=|<=|>|<)

    logical-operators:
        patterns:
          - name: keyword.operator.logical.spwn
            match: (\|\||&&|!|\|)

    assignment-operators:
        patterns:
          - name: keyword.operator.assignment.spwn
            match: (=|\+=|\-=|\*=|\/=|\^=|%=|\/%=)

    arithmetic-operators:
        patterns:
          - name: keyword.operator.arithmetic.spwn
            match: (\+|\-|\*\*|\*|\/%|\/|\^|%)