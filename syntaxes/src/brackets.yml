scopeName: source.spwn

patterns:
    - include: '#null'

repository:
    brackets:
        patterns:
          - include: '#trigger-function'
          - include: '#standard-block'
          - include: '#code-block'
          - include: '#directive-statement'
          - include: '#array-container'
          - include: '#function-definite'
          - include: '#function-ambiguous'
          - include: '#function-call'

    trigger-function:
        patterns:
          - begin: (!)(\{)
            beginCaptures:
                1: { name: storage.modifier.spwn }
                2: { name: punctuation.other.bracket.curly.begin.spwn }
            end: \}
            endCaptures:
                0: { name: punctuation.other.bracket.curly.end.spwn }
            patterns:
              - include: '#root'

    standard-block:
        patterns:
          - begin: (?<!\)\s*)\{
            beginCaptures:
                0: { name: punctuation.other.bracket.curly.begin.spwn }
            end: \}
            endCaptures:
                0: { name: punctuation.other.bracket.curly.end.spwn }
            patterns:
              - include: '#property-block'
              - include: '#root'

    property-block:
        patterns:
          - begin: \b([a-zA-Z_]\w*)\s*(:)(?!:)(?=\s*!\{)
            beginCaptures:
                1: { name: entity.name.function.macro.spwn }
                2: { name: punctuation.separator.key-value.spwn }
            end: ',|(?=\})|(?=;)'
            endCaptures:
                0: { name: punctuation.separator.spwn }
            patterns:
            - include: '#root'        

          - begin: \b(else)\s*(:)(?!:)
            beginCaptures:
                1: { name: keyword.control.spwn }
                2: { name: punctuation.separator.key-value.spwn }
            end: ',|(?\})|(?=;)'
            
          - begin: ([a-zA-Z_]\w*)\s*(:)(?!:)(?=\s*\()
            beginCaptures:
                1:
                    patterns:
                      - include: '#overloads'

                      - name: entity.name.function.spwn
                        match: '[a-zA-Z_]\w*'

                2: { name: punctuation.separator.key-value.spwn }
            end: ',|(?=\})|(?=;)'
            endCaptures:
                0: { name: punctuation.separator.spwn }
            patterns:
            - include: '#root'                

          - begin: ([a-zA-Z_]\w*)\s*(:)(?!:)
            beginCaptures:
                1: { name: variable.property.spwn }
                2: { name: punctuation.separator.key-value.spwn }
            end: ',|(?=\})|(?=;)'
            endCaptures:
                0: { name: punctuation.separator.spwn }
            patterns:
                - include: '#root'

    code-block:
        patterns:
          - begin: \{
            beginCaptures:
                0: { name: punctuation.other.bracket.curly.begin.spwn }
            end: \}
            endCaptures:
                0: { name: punctuation.other.bracket.curly.end.spwn }
            patterns:
              - include: '#root'

    directive-statement:
        patterns:
          - begin: '#\['
            beginCaptures:
                0: { name: keyword.directive.begin.spwn }
            end: \]
            endCaptures:
                0: { name: keyword.directive.end.spwn }
            patterns:
              - name: support.function.directive.spwn
                match: \b(no_std|cache_output|example|constructor|desc)\b
            
              - include: '#root'

    array-container:
        patterns:
          - begin: \[
            beginCaptures:
                0: { name: punctuation.other.bracket.square.begin.spwn }
            end: \]
            endCaptures:
                0: { name: punctuation.other.bracket.square.end.spwn }
            patterns:
              - include: '#root'

    function-definite:
        patterns:
          - begin: (?<!\w\s*)\((?=\s*[a-zA-Z_]\w*\s*(?:,|:(?!:)|=(?![=>])|\)\s*(?:\{|=>)))
            beginCaptures:
                0: { name: punctuation.other.parameters.begin.spwn }
            end: \)
            endCaptures:
                0: { name: punctuation.other.parameters.end.spwn }
            patterns:
              - include: '#function-arguments'
              - include: '#root'

    function-ambiguous:
        patterns: 
          - begin: (?<!\w\s*)\(
            beginCaptures:
                0: { name: punctuation.other.bracket.round.begin.spwn }
            end: \)
            endCaptures:
                0: { name: punctuation.other.bracket.round.end.spwn }
            patterns:
              - begin: (?=,|\s*[a-zA-Z_]\w*\s*(?:,|:(?!:)|=(?![=>])|\)\s*\{))
                end: (?=\))
                patterns:
                  - include: '#function-arguments'
                  
              - include: '#root'

    function-call:
        patterns:
          - begin: \(
            beginCaptures:
                0: { name: punctuation.other.bracket.round.begin.spwn }
            end: \)
            endCaptures:
                0: { name: punctuation.other.bracket.round.end.spwn }
            patterns:
              - match: \b([a-zA-Z_]\w*)\s*(=)(?![=>])
                captures:
                    1: { name: variable.parameter.spwn }
                    2: { name: keyword.operator.assignment.spwn }
            
              - include: '#root'

    function-arguments:
        patterns:
          - include: '#self-keyword'

          - begin: \b([a-zA-Z_]\w*)(?:\s*(?:(:(?!:))|(=(?![=>])))|\b)
            beginCaptures:
                1: { name: variable.parameter.spwn }
                2: { name: punctuation.separator.key-value.spwn }
                3: { name: keyword.operator.assignment.spwn }
            end: (?=[,)])
            patterns:
              - include: '#root'
        
          - include: '#root'
