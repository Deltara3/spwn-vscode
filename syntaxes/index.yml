name: SPWN
scopeName: source.spwn

includes:
  - comments
  - literals
  - keywords
  - brackets
  - operators
  - accessors
  - overloads
  - other

patterns:
  - include: '#root'

repository:
    root:
        patterns:
          - include: '#comments'
          - include: '#literals'
          - include: '#keywords'
          - include: '#types'
          - include: '#property-access'
          - include: '#standalone-call'
          - include: '#namespace-access'
          - include: '#punctuation'
          - include: '#brackets'
          - include: '#operators'